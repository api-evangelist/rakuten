features:
  - name: Rakuten Web Services
    description: Public RWS APIs cover Ichiba, Books, Travel, Recipe, Kobo, and GORA — all under a single Rakuten application ID.
  - name: Long-Lived Public API Platform
    description: RWS has been one of Japan's longest-running public commerce APIs and remains widely used by Japanese developers and academic projects.
  - name: Japan-Specific Datasets
    description: Hotel area classifications, Japanese recipe taxonomies, and Japanese golf course databases are unique to Rakuten's ecosystem.
  - name: Merchant Operations via RMS
    description: Ichiba sellers and partner OMS / ERP vendors integrate operations through the restricted-access RMS API surface.
  - name: Rakuten Pay
    description: QR and online payment acceptance for Japanese merchants through the Rakuten Pay merchant program.
useCases:
  - name: Price Comparison
    description: Build Japanese price-comparison and product-discovery apps on top of Ichiba and Books search APIs.
  - name: Travel Booking
    description: Display Rakuten Travel hotel inventory in third-party travel apps and meta-search engines.
  - name: Recipe Discovery
    description: Power recipe and cooking apps with Japanese user-submitted Rakuten Recipe data.
  - name: Golf Reservations
    description: Surface Rakuten GORA tee-time inventory in sports and lifestyle apps.
  - name: Marketplace Operations
    description: Ichiba sellers manage products, orders, and fulfillment via RMS through ERP and OMS partners.
integrations:
  - name: Rakuten Ichiba
  - name: Rakuten Books
  - name: Rakuten Kobo
  - name: Rakuten Travel
  - name: Rakuten Recipe
  - name: Rakuten GORA
  - name: Rakuten Pay
  - name: Rakuten Card
  - name: Rakuten Mobile
  - name: Rakuten Advertising
authentication:
  - type: APIKey
    description: Rakuten Web Services authenticate with a free application ID issued from the RWS developer console.
  - type: OAuth2
    description: Rakuten Pay and RMS partner integrations use OAuth 2.0 with merchant-issued credentials.
  - type: AccessToken
    description: RMS endpoints require a per-shop service-secret access token issued through the Ichiba RMS portal.
